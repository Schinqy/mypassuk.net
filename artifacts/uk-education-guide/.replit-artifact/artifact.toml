kind = "web"
previewPath = "/"
title = "UK Education & Career Guide"
version = "1.0.0"
id = "artifacts/uk-education-guide"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24474

[services.development]
run = "pnpm --filter @workspace/uk-education-guide run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/uk-education-guide", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/uk-education-guide", "run", "serve" ]

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24474"
BASE_PATH = "/"
