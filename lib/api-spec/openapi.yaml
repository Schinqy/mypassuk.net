openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: UK Education & Career Guide API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: subjects
    description: GCSE and A-level subjects
  - name: careers
    description: Career pathways
  - name: institutions
    description: HE and FE institutions
  - name: routes
    description: Post-16 and post-18 routes
  - name: quiz
    description: Career/subject interest quiz
  - name: openai
    description: OpenAI AI chat, image, and audio operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /subjects:
    get:
      operationId: getSubjects
      tags: [subjects]
      summary: Get all subjects
      description: Returns all GCSE and A-level subjects with study tips
      parameters:
        - name: level
          in: query
          schema:
            type: string
            enum: [GCSE, A-Level, Both]
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of subjects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subject"

  /subjects/{id}:
    get:
      operationId: getSubjectById
      tags: [subjects]
      summary: Get subject by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Subject details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subject"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /careers:
    get:
      operationId: getCareers
      tags: [careers]
      summary: Get career pathways
      description: Returns career pathways with required subjects and salary info
      parameters:
        - name: sector
          in: query
          schema:
            type: string
        - name: subjectId
          in: query
          schema:
            type: integer
        - name: minSalary
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of careers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Career"

  /careers/{id}:
    get:
      operationId: getCareerById
      tags: [careers]
      summary: Get career by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Career details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Career"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /institutions:
    get:
      operationId: getInstitutions
      tags: [institutions]
      summary: Get HE and FE institutions
      description: Filter universities, colleges, and training providers
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [University, College, Apprenticeship Provider, Conservatoire, Specialist]
        - name: region
          in: query
          schema:
            type: string
        - name: russellGroup
          in: query
          schema:
            type: boolean
        - name: minEntryGrade
          in: query
          schema:
            type: string
        - name: careerId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of institutions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Institution"

  /institutions/alerts:
    get:
      operationId: getInstitutionAlerts
      tags: [institutions]
      summary: Get recruitment alerts for all institutions
      description: Returns all institutions with upcoming open day dates, fees and application deadlines, sorted by nearest open day
      responses:
        "200":
          description: List of institution alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InstitutionAlert"

  /institutions/{id}:
    get:
      operationId: getInstitutionById
      tags: [institutions]
      summary: Get institution by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Institution details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Institution"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /routes:
    get:
      operationId: getRoutes
      tags: [routes]
      summary: Get post-16 and post-18 routes
      description: Returns all available study and career routes after GCSEs or A-Levels
      parameters:
        - name: afterLevel
          in: query
          schema:
            type: string
            enum: [GCSE, A-Level]
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of routes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Route"

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpenaiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiMessageBody"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

  /quiz/recommend:
    post:
      operationId: getRecommendations
      tags: [quiz]
      summary: Get personalised recommendations
      description: Based on subjects, grades, and interests, returns career and institution recommendations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizInput"
      responses:
        "200":
          description: Personalised recommendations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

    Subject:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        level:
          type: string
          enum: [GCSE, A-Level, Both]
        category:
          type: string
        description:
          type: string
        examBoards:
          type: array
          items:
            type: string
        studyTips:
          type: array
          items:
            type: string
        keyTopics:
          type: array
          items:
            type: string
        assessmentStructure:
          type: string
        usefulResources:
          type: array
          items:
            $ref: "#/components/schemas/Resource"
        relatedCareers:
          type: array
          items:
            type: integer
      required:
        - id
        - name
        - level
        - category
        - description

    Resource:
      type: object
      properties:
        name:
          type: string
        url:
          type: string
        type:
          type: string
          enum: [Website, Video, Past Papers, Revision Guide, Practice Questions]
      required:
        - name
        - type

    Career:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        sector:
          type: string
        description:
          type: string
        averageSalaryMin:
          type: integer
        averageSalaryMax:
          type: integer
        requiredSubjects:
          type: array
          items:
            type: integer
        preferredSubjects:
          type: array
          items:
            type: integer
        entryRoutes:
          type: array
          items:
            type: string
        requiredQualifications:
          type: array
          items:
            type: string
        jobOutlook:
          type: string
          enum: [Excellent, Good, Moderate, Declining]
        workplaces:
          type: array
          items:
            type: string
        dayInTheLife:
          type: string
        relatedCareers:
          type: array
          items:
            type: integer
      required:
        - id
        - title
        - sector
        - description
        - averageSalaryMin
        - averageSalaryMax

    Institution:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [University, College, Apprenticeship Provider, Conservatoire, Specialist]
        region:
          type: string
        city:
          type: string
        description:
          type: string
        websiteUrl:
          type: string
        russellGroup:
          type: boolean
        ranking:
          type: integer
        entryRequirements:
          type: string
        ucasPoints:
          type: integer
        studentSatisfaction:
          type: number
        notableSubjects:
          type: array
          items:
            type: string
        facilities:
          type: array
          items:
            type: string
        bursaries:
          type: boolean
        internationalStudents:
          type: boolean
        relatedCareers:
          type: array
          items:
            type: integer
        annualFees:
          type: integer
          description: UK domestic annual tuition fee in GBP
        internationalFees:
          type: integer
          description: International student annual fee in GBP
        openDayDates:
          type: array
          items:
            type: string
          description: Upcoming open day dates in YYYY-MM-DD format
        applicationDeadline:
          type: string
          description: Application deadline text (e.g. "15 January 2027")
        applicationsOpen:
          type: string
          description: When applications open (e.g. "September 2026")
      required:
        - id
        - name
        - type
        - region
        - city
        - description

    InstitutionAlert:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
        city:
          type: string
        annualFees:
          type: integer
        internationalFees:
          type: integer
        openDayDates:
          type: array
          items:
            type: string
        applicationDeadline:
          type: string
        applicationsOpen:
          type: string
        websiteUrl:
          type: string
      required:
        - id
        - name
        - type
        - city

    Route:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
        afterLevel:
          type: string
          enum: [GCSE, A-Level]
        duration:
          type: string
        description:
          type: string
        pros:
          type: array
          items:
            type: string
        cons:
          type: array
          items:
            type: string
        entryRequirements:
          type: string
        potentialEarnings:
          type: string
        examples:
          type: array
          items:
            type: string
      required:
        - id
        - name
        - type
        - afterLevel
        - duration
        - description

    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    CreateOpenaiConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    SendOpenaiMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content
    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages
    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    QuizInput:
      type: object
      properties:
        gcseSubjects:
          type: array
          items:
            type: object
            properties:
              subjectId:
                type: integer
              grade:
                type: string
            required:
              - subjectId
              - grade
        aLevelSubjects:
          type: array
          items:
            type: object
            properties:
              subjectId:
                type: integer
              predictedGrade:
                type: string
            required:
              - subjectId
              - predictedGrade
        interests:
          type: array
          items:
            type: string
        preferredRegion:
          type: string
        preferredRouteType:
          type: string
          enum: [University, Apprenticeship, College, Any]
      required:
        - interests

    QuizResult:
      type: object
      properties:
        recommendedCareers:
          type: array
          items:
            $ref: "#/components/schemas/Career"
        recommendedInstitutions:
          type: array
          items:
            $ref: "#/components/schemas/Institution"
        recommendedRoutes:
          type: array
          items:
            $ref: "#/components/schemas/Route"
        matchScore:
          type: number
        personalMessage:
          type: string
      required:
        - recommendedCareers
        - recommendedInstitutions
        - recommendedRoutes
        - personalMessage
